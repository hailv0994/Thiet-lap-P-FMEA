<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P-FMEA Builder — Thiết lập P-FMEA từ Control Plan</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>P-FMEA Builder</h1>
      <span class="subtitle">Thiết lập P-FMEA tự động từ Control Plan (CP)</span>
    </div>
    <div class="topbar-right">
      <button id="btnSave" class="btn btn-light">💾 Lưu</button>
      <button id="btnExport" class="btn btn-primary" disabled>⬇ Xuất Excel (.xlsx)</button>
    </div>
  </header>

  <section class="toolbar meta-bar">
    <div class="tool-group">
      <label>Bộ phận:
        <select id="mDept" class="inp-md"></select>
      </label>
      <label>Sản phẩm:
        <select id="mProduct" class="inp-md"></select>
      </label>
      <label>Dây chuyền:
        <select id="mLine" class="inp-md"></select>
      </label>
      <label>Model:
        <input type="text" id="mModel" list="dlModel" class="inp-md" placeholder="VD: G823-00" />
      </label>
    </div>
    <div class="tool-group right">
      <label>Mở dự án đã lưu:
        <select id="projSelect"><option value="">— Chọn —</option></select>
      </label>
      <button id="btnDeleteProj" class="btn ghost" title="Xóa dự án đã lưu">🗑</button>
      <button id="btnExportJson" class="btn ghost" title="Tải file sao lưu (.json)">⬇ Sao lưu</button>
      <label class="file-btn" title="Nạp file sao lưu (.json)">
        <input type="file" id="fileJson" accept=".json" hidden />
        <span class="btn ghost">⬆ Nạp sao lưu</span>
      </label>
    </div>
    <datalist id="dlModel"></datalist>
  </section>

  <section class="toolbar">
    <div class="tool-group">
      <label class="file-btn">
        <input type="file" id="fileCP" accept=".xlsx,.xls" hidden />
        <span class="btn">📂 Tải Control Plan</span>
      </label>
      <span id="fileName" class="muted">Chưa chọn file</span>
    </div>

    <div class="tool-group" id="sheetGroup" hidden>
      <span id="sheetInfo" class="muted"></span>
      <button id="btnLoad" class="btn">＋ Nạp tất cả công đoạn vào P-FMEA</button>
    </div>

    <div class="tool-group right">
      <button id="btnAddProc" class="btn ghost" hidden>＋ Công đoạn trống</button>
      <button id="btnClear" class="btn ghost" hidden>🗑 Xóa hết</button>
    </div>
  </section>

  <main class="sheet-wrap">
    <div class="page-title">　＜GL SQS0811 Quy định vận dụng D/P FMEA　Phụ lục - 4　GL SQS0811 D/P FMEA運用規定　付表-4 ＞</div>
    <table id="fmea" class="fmea-table">
      <colgroup>
        <col class="c-a" /><col class="c-b" /><col class="c-c" /><col class="c-d" />
        <col class="c-e" /><col class="c-f" /><col class="c-g" /><col class="c-h" />
        <col class="c-i" /><col class="c-j" /><col class="c-k" /><col class="c-l" />
        <col class="c-m" /><col class="c-n" /><col class="c-o" /><col class="c-p" />
        <col class="c-q" /><col class="c-r" /><col class="c-s" />
      </colgroup>
      <thead></thead>
      <tbody></tbody>
    </table>
    <div id="emptyState" class="empty-state">Chưa có dữ liệu. Hãy tải Control Plan và nạp một công đoạn.</div>
  </main>

  <script src="vendor/xlsx.full.min.js"></script>
  <script src="vendor/fflate.min.js"></script>
  <script src="data/severity.js"></script>
  <script src="data/template.js"></script>
  <script src="data/material.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/export-template.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
